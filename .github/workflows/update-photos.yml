name: Update photos.json

on:
  push:
    paths:
      - 'Photos/**'

jobs:
  update-photos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate photos.json
        run: |
          files=$(ls Photos/*.jpg Photos/*.jpeg Photos/*.png 2>/dev/null | sort | sed 's|^|"|;s|$|"|' | paste -sd ',' -)
          echo "[$files]" > photos.json

      - name: Commit updated photos.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add photos.json
          git diff --staged --quiet || git commit -m "Auto-update photos.json"
          git push
